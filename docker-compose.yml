version: "3.9"

services:

  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: parkeye-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - ENV=development
    volumes:
      - ./app:/app/app         # hot-reload: changes reflect instantly
      - ./mock:/app/mock
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── PostgreSQL (local dev only — production uses Supabase) ───────────────────
  db:
    image: postgres:16-alpine
    container_name: parkeye-db
    restart: unless-stopped
    ports:
      - "5432:5432"            # exposed so you can inspect with TablePlus / pgAdmin
    environment:
      POSTGRES_USER: parkeye
      POSTGRES_PASSWORD: parkeye
      POSTGRES_DB: parkeye
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parkeye"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis (optional — uncomment in Phase 2 when caching is needed) ───────────
  # redis:
  #   image: redis:7-alpine
  #   container_name: parkeye-redis
  #   restart: unless-stopped
  #   ports:
  #     - "6379:6379"

volumes:
  postgres_data:
